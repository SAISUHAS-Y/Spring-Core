# Spring Core Workflow Spring Project Creation

## Action

Follow the spring-project-creation workflow:
1. Generate Maven project structure with pom.xml
2. Create Eclipse IDE configuration files (.classpath, .project, .settings)
3. Setup JPA persistence configuration (META-INF/persistence.xml)
4. Create main application class (App.java)
5. Setup Spring configuration (AppConfig.java or XML)
6. Create entity classes for data model
7. Implement repository layer for data access
8. Implement service layer for business logic
9. Implement controller layer for request handling
10. Create test classes (AppTest.java)
11. Generate compiled classes in target directory

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: pom.xml, .classpath, .project

